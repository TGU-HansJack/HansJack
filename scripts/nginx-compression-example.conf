# HansJack static compression example (Nginx)
# Usage:
# 1) Run `npm run build:assets` in theme directory to generate .min/.gz/.br files.
# 2) Include this file in your Nginx server block (adjust root/path as needed).

# ---- Gzip (dynamic + static) ----
gzip on;
gzip_static on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ---- Brotli (requires ngx_brotli module) ----
# If your Nginx does not have Brotli module, remove this block.
brotli on;
brotli_static on;
brotli_comp_level 6;
brotli_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ---- Long cache for static assets ----
location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
    try_files $uri =404;
}
